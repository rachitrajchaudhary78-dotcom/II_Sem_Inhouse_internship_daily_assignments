<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #ddd0ef;
    margin: 0;
    padding: 40px 0;
  }

  .form-container {
    background-color: #ffffff;
    max-width: 500px;
    margin: 0 auto;
    padding: 30px 35px;
    border-radius: 8px;
    border-top: 6px solid #5a2d8c;
    box-shadow: 0 4px 14px rgba(90, 45, 140, 0.25);
  }

  h2 {
    text-align: center;
    color: #3d1f5c;
    margin-bottom: 25px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
    margin-top: 15px;
    font-size: 14px;
    color: #3d1f5c;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  select {
    width: 100%;
    padding: 8px;
    border: 1px solid #b196d6;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 14px;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  input[type="date"]:focus,
  select:focus {
    outline: none;
    border-color: #5a2d8c;
    box-shadow: 0 0 0 2px rgba(90, 45, 140, 0.2);
  }

  .row {
    display: flex;
    gap: 15px;
  }

  .row .col {
    flex: 1;
  }

  .gender-options {
    margin-top: 8px;
  }

  .gender-options label {
    display: inline;
    font-weight: normal;
    margin-right: 15px;
  }

  .gender-options input {
    margin-right: 5px;
  }

  input[type="submit"] {
    width: 100%;
    background-color: #5a2d8c;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    margin-top: 25px;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #45225f;
  }
</style>
</head>
<body>

  <div class="form-container">
    <h2>Registration Form</h2>

    <form>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter email address" required>

      <div class="row">
        <div class="col">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
        </div>
        <div class="col">
          <label for="dob">Birth Date</label>
          <input type="date" id="dob" name="dob">
        </div>
      </div>

      <label>Gender</label>
      <div class="gender-options">
        <label><input type="radio" name="gender" value="male" checked> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
        <label><input type="radio" name="gender" value="other"> Prefer not to say</label>
      </div>

      <label for="address1">Address</label>
      <input type="text" id="address1" name="address1" placeholder="Enter street address">
      <br><br>
      <input type="text" id="address2" name="address2" placeholder="Enter street address line 2">

      <div class="row" style="margin-top: 15px;">
        <div class="col">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="">Select country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="col">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Enter your city">
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label for="region">Region</label>
          <input type="text" id="region" name="region" placeholder="Enter your region">
        </div>
        <div class="col">
          <label for="postal">Postal Code</label>
          <input type="text" id="postal" name="postal" placeholder="Enter postal code">
        </div>
      </div>

      <input type="submit" value="submit">
    </form>
  </div>
</body>
</html>
