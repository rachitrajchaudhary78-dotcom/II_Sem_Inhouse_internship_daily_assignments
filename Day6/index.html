<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
     <h2 class="text-center mb-4">student records </h2>
     <input type="text" id="search" class="form-control mb-4"
     placeholder="search student">
<div id="container" class="row g-4"></div>
    </div>
    <script>
      
const students = [
    {
        name:"Rachit",
        branch:"CSE",
        cgpa:8.4
    },
    {
        name:"Ridham",
        branch:"CSE",
        cgpa:9.4
    },
    {
        name:"Rathi",
        branch:"CSE",
        cgpa:5.4
    },
    {
        name:"Piyush",
        branch:"CSE",
        cgpa:7.4
    }
];
        let html ="";
        for( let i=0;i<students.length;i++){
            html +=`
            <div class="col-md-4 card-item">
                <div class="card shadow">
                    <div class="card-body">
                        <h4>${students[i].name}</h4>
                        <button class="btn btn-primary btn-sm mt-2">
                            onclick="toggleDetails(${i})">
                            show details
                            </button>
                            <div class="details mt-3" style="display:none;">
                                <P><strong>branch:</strong>${students[i].branch}</p>
                                    <p><strong>cgpa:</strong>${students[i].cgpa}</p>
                        </div>
                        </div>
                        </div>
                        </div>
                        `;
                                }
                        

document.getElementById("container").innerHTML = html;

function toggleDetails(i){
    let details = document.getElementById("details"+i);

    if(details.style.display=="none"){
        details.style.display="block";
    }else{
        details.style.display="none";
    }
}
document.getElementById("json").innerHTML=JSON.stringify(students,
["name,"],4);

</script>
<script>
fetch('https://jsonplaceholder.typecode.com/users')
.then(res => res.josn())
.then(data => {
console.log(data);
let username =data.map(user => user.username);
console.log(username);

});
</script>
</body>
</html>
    </script>
</body>
</html>
