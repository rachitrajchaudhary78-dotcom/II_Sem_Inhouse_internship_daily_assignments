<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="header">
       <h3>
     Student Registration 2026
</h3>
<form action="registation.php" method="POST" class="form">
        <div class="input-box">
        
            <label >
                Name :
            <input type="text" id="txtname" name="fullname" required placeholder="Enter Your Name">
            </label><br>
             <label >
                Username :
            <input type="text" id="txtusername" name="username" placeholder="Enter Your UserName">
            </label><br>
            <label>
                Email :
                <input type="email" name="email" id="txtemail" required placeholder="Enter Your Email">
            </label><br>
            <label>Contact Number :
                <input type="tel" name="Contact" id="txtnumber" required placeholder="Enter Your Number">
            </label><br>
            <label for="Password :">
                Password :
                <input type="password" name="password" minlength="8" id="password" required placeholder="Enter Password">
            </label><br>
            <label for="Confirm Password :">
                Confirm Password :
                <input type="password" name="confirm_password" minlength="8" id="Confirm- password" required placeholder="Enter Password">
            
            </label><br>
            <label for="DOB">DOB :
                <input type="date" name="dob" id="DOB" required placeholder="Enter DOB">
            </label><br>
            </div>
            <label>
                <input type="radio" id="check-female" name="Gender" checked>
                <label for="check-female">Female</label>
            </label>
             <label>
                <input type="radio" id="check-male" name="Gender" checked>
                <label for="check-male">Male</label>
            </label>
             <label>
                <input type="radio" id="check-transgender" name="Gender" checked>
                <label for="check-transgender">Transgender</label>
            </label><br>
              <label>
                <h4>Skill You Have</h4>
                <!-- <input type="radio" id="check-skill" name="skill" checked>
                <label for="check-skill">HTML</label>
            </label>
            <label>
                <input type="radio" id="check-skill" name="skill" checked>
                <label for="check-skill">CSS</label> -->
                <input type="checkbox" name="skills[]"> HTML
                <input type="checkbox" name="skills[]"> CSS
                <input type="checkbox" name="skills[]"> JavaScript
            </label><br>
<button type="reset"><h4>Reset</h4></button>
         <button type="submit"> <h4>Submit</h4></button>
         
        </form>
        
    </div>
  
</body>
</html>
