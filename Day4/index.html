<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
</head>
<body>
    <div>
        <h1> Todays Date</h1>
        <button type="button" onclick="displayDate()">
            check here to get Date
        </button>
        <div id="demo"></div>
    </div>
    <script>
        function displayDate(){
            document.getElementById('demo').innerHTML=Date();
        }
    </script>
</body>
</html>
